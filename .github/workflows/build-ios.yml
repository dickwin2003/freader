name: Build iOS IPA (TrollStore)

# 该 workflow 在 GitHub 托管的 macOS runner 上把 Flutter 项目编译成
# 【未签名】的 iOS ipa,供越狱机/巨魔商店(TrollStore)安装。
# TrollStore 利用 CoreTrust 漏洞,可直接安装未签名 ipa,所以构建全程关闭代码签名。

on:
  # 手动触发(必选):Actions 页点 Run workflow
  workflow_dispatch:
  # 推到 main 分支时自动触发(便利,可随时关掉)
  push:
    branches:
      - main

# 同一分支的并发构建只保留最新一次,避免浪费 runner 时间
concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build unsigned iOS IPA
    runs-on: macos-latest

    steps:
      # 1) 拉代码
      - name: Checkout 仓库
        uses: actions/checkout@v4

      # 2) 安装 Flutter(stable 通道)。subosito/flutter-action@v2 自带 pub cache。
      - name: 设置 Flutter(stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # 3) CocoaPods 缓存。首次构建前 ios/Podfile.lock 不存在(首次 pod install 才生成),
      #    所以 key 用 Podfile.lock 的 hash 作为可命中前缀,缺失时回退到 ios/ 目录结构 hash,
      #    再回退到任意前缀(命中即恢复,但 pod install 仍会按需补全)。
      - name: 缓存 CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/.cocoapods/repos
          key: cocoapods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock', 'ios/Podfile') }}
          restore-keys: |
            cocoapods-${{ runner.os }}-

      # 4) 拉依赖
      - name: flutter pub get
        run: flutter pub get

      # 5) 一次性预装 Pods(避免 build 阶段才解析报错难排查)。
      #    Podfile 可能尚未生成,flutter precache --ios 会确保模板就绪。
      - name: 预安装 CocoaPods
        run: |
          # 若 Podfile 不存在,先让 Flutter 生成 ios 工程模板里的 Podfile
          if [ ! -f ios/Podfile ]; then
            flutter precache --ios
          fi
          cd ios && pod install --repo-update || pod install

      # 6) 核心构建:优先走 flutter build ipa --no-codesign(产出 build/ios/ipa/*.ipa)。
      #    若失败(部分 Flutter/插件组合下 ipa 仍会要求签名导出),回退到
      #    flutter build ios --no-codesign 拿到 Runner.app 后手动 Payload 打包。
      - name: 构建未签名 ipa
        id: build_ipa
        run: |
          set -e
          # flutter build ipa --no-codesign 会 archive，但新版 Flutter 在 --no-codesign 下
          # 跳过 IPA 导出（只产 .xcarchive）。我们从 xcarchive 手动打包未签名 IPA（TrollStore 可装）。
          flutter build ipa --release --no-codesign --export-options-plist=ios/ExportOptions.plist 2>&1 | tee /tmp/build.log

          IPA_FILE="$(ls build/ios/ipa/*.ipa 2>/dev/null | head -n1)"
          if [ -z "$IPA_FILE" ]; then
            echo "ipa 未产出（--no-codesign 跳过了 IPA 导出），从 xcarchive 手动打包"
            APP_PATH="$(ls -d build/ios/archive/*.xcarchive/Products/Applications/*.app 2>/dev/null | head -1)"
            test -n "$APP_PATH" -a -d "$APP_PATH"
            echo "从 $APP_PATH 打包"
            rm -rf Payload
            mkdir -p Payload
            cp -R "$APP_PATH" Payload/
            mkdir -p build/ios/ipa
            zip -qry build/ios/ipa/freader-unsigned.ipa Payload
            IPA_FILE="build/ios/ipa/freader-unsigned.ipa"
          fi
          test -n "$IPA_FILE"
          echo "ipa 产物: $IPA_FILE"
          echo "ipa_path=$IPA_FILE" >> "$GITHUB_OUTPUT"
          ls -lh "$IPA_FILE"

      # 构建失败时把 flutter build 日志尾部贴到 Summary，无需展开 step 即可看到报错
      - name: 构建失败时把日志贴到 Summary
        if: failure()
        run: |
          {
            echo "## ❌ flutter build 失败 — 日志最后 100 行"
            echo '```'
            tail -100 /tmp/build.log 2>/dev/null || echo "(无 build.log)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # 7) 打印产物路径与大小(便于在 Actions 日志里直接看到体积/路径)
      - name: 打印产物信息
        run: |
          IPA="${{ steps.build_ipa.outputs.ipa_path }}"
          echo "=== 产物路径 ==="
          echo "$IPA"
          echo "=== ls -lh ==="
          ls -lh "$IPA"
          echo "=== du -h(所在目录) ==="
          du -h "$(dirname "$IPA")"/* || true
          echo "=== Runner.app 信息(参考) ==="
          ls -lh build/ios/iphoneos/Runner.app 2>/dev/null | head -5 || true

      # 8) 上传 artifact。if-no-files-found: error 保证产物缺失时 job 立即红,
      #    避免静默上传空 artifact。
      - name: 上传 ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: freader-ios
          path: |
            ${{ steps.build_ipa.outputs.ipa_path }}
          if-no-files-found: error
          retention-days: 14
